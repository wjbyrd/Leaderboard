<!DOCTYPE html>
<html>
<head>
<style>
body{
  margin:0;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:20px;
}

/* 🔥 Hide Google header */
iframe{
  width:700px;
  height:600px;
  border:none;
  overflow:hidden;
}

/* 👇 Crop the top garbage */
.wrapper{
  width:460px;
  height:360px;
  overflow:hidden;
  position:relative;
}

.wrapper iframe{
  position:absolute;
  top:-75px; /* 🔥 THIS HIDES "Gauntlet Tracker" */
  left:-110px;
  width: 600px;
  height: 600px;
}
</style>
</head>

<body>

<div class="wrapper">
  <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSCScHll0u4SDwz9_k5IO_u-RDc6miZ4gCJLXW2Nm95d53PItAn0MYhrgzaKPdTkBYRloLDkqNK3XE9/pubhtml?gid=128098764&amp;single=true&amp;widget=true&amp;headers=false"></iframe>
</div>

</body>
</html>
